<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 280">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea"/>
      <stop offset="100%" style="stop-color:#764ba2"/>
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="440" height="280" fill="url(#bg)"/>

  <!-- Icon -->
  <g transform="translate(40, 80)">
    <path d="M0 40 C0 40, 18 16, 40 16 C62 16, 80 40, 80 40 C80 40, 62 64, 40 64 C18 64, 0 40, 0 40 Z" fill="none" stroke="white" stroke-width="4" stroke-linejoin="round"/>
    <circle cx="40" cy="40" r="12" fill="white"/>
    <circle cx="40" cy="40" r="6" fill="#667eea"/>
    <circle cx="68" cy="20" r="8" fill="#ff5252"/>
  </g>

  <!-- Text -->
  <text x="140" y="105" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="36" font-weight="700" fill="white">PageWatch</text>
  <text x="140" y="135" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="16" fill="rgba(255,255,255,0.85)">Web Page Change Monitor</text>

  <!-- Feature pills -->
  <g transform="translate(40, 180)">
    <rect x="0" y="0" width="110" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
    <text x="55" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">Price Alerts</text>

    <rect x="120" y="0" width="120" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
    <text x="180" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">Restock Alerts</text>

    <rect x="250" y="0" width="100" height="30" rx="15" fill="rgba(255,255,255,0.2)"/>
    <text x="300" y="20" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="white">Webhooks</text>
  </g>

  <!-- Tagline -->
  <text x="40" y="250" font-family="sans-serif" font-size="13" fill="rgba(255,255,255,0.7)">Get notified when any webpage changes. Runs in the background.</text>
</svg>
